---
# ── Headless service required by StatefulSet ─────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: taskapp
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# ── ClusterIP service for backend to connect to ───────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: taskapp
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# ── StatefulSet ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: taskapp
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999       # postgres user
        fsGroup: 999

      containers:
        - name: postgres
          image: postgres:15.6-alpine   # pinned — never :latest
          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: taskapp-config
                  key: DATABASE_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: taskapp-config
                  key: DATABASE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DATABASE_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - taskapp
                - -d
                - taskapp
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - taskapp
                - -d
                - taskapp
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - taskapp
                - -d
                - taskapp
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12   # 60s total startup budget

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

  # PVC template — creates one PVC per pod, survives pod deletion
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path   # k3s default storage class
        resources:
          requests:
            storage: 5Gi
