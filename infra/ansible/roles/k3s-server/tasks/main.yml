# install k3s server
- name: Check if k3s server is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Check installed k3s version
  ansible.builtin.command: k3s --version
  register: k3s_installed_version
  changed_when: false
  failed_when: false
  when: k3s_binary.stat.exists

- name: Ensure /etc/rancher/k3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0755'

- name: Configure k3s server TLS SAN for public IP
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    mode: '0644'
    content: |
      tls-san:
        - "{{ control_plane_public_ip }}"
  notify: Restart k3s server

- name: Check current k3s serving certificate SANs
  ansible.builtin.shell: |
    openssl x509 -in /var/lib/rancher/k3s/server/tls/serving-kube-apiserver.crt -noout -text 2>/dev/null || true
  register: current_serving_cert
  changed_when: false

- name: Force k3s to regenerate its serving certificate if public IP SAN is missing
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/tls/dynamic-cert.json
    state: absent
  when: control_plane_public_ip not in current_serving_cert.stdout
  notify: Restart k3s server

- name: Install k3s server
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" \
      sh -s - server {{ k3s_server_extra_args }}
  args:
    executable: /bin/bash
  when: >
    not k3s_binary.stat.exists or
    k3s_version not in (k3s_installed_version.stdout | default(''))
  notify: Restart k3s server

- name: Apply pending k3s restart now
  ansible.builtin.meta: flush_handlers

- name: Ensure k3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for k3s to be ready (node-token file appears)
  ansible.builtin.wait_for:
    path: "{{ k3s_token_path }}"
    state: present
    timeout: 120

- name: Wait for the API server to become available
  ansible.builtin.command: k3s kubectl get nodes
  register: nodes_ready
  retries: 20
  delay: 10
  until: nodes_ready.rc == 0
  changed_when: false

# capture node token for workers
- name: Read node token
  ansible.builtin.slurp:
    src: "{{ k3s_token_path }}"
  register: k3s_token_raw

- name: Set k3s_token fact (shared to all hosts in play)
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_token_raw.content | b64decode | trim }}"

# fetch kubeconfig to local machine
- name: Read raw kubeconfig from control-plane
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: raw_kubeconfig
  become: true

- name: Ensure local ~/.kube directory exists
  ansible.builtin.file:
    path: "{{ kubeconfig_local_path | dirname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Write kubeconfig locally with public IP substituted
  ansible.builtin.copy:
    dest: "{{ kubeconfig_local_path | expanduser }}"
    mode: '0600'
    content: >-
      {{ (raw_kubeconfig.content | b64decode)
         | regex_replace('https://(127\.0\.0\.1|localhost):6443', 'https://' + control_plane_public_ip + ':6443') }}
  delegate_to: localhost
  become: false

- name: Verify kubeconfig has the correct server address
  ansible.builtin.command: grep 'server:' {{ kubeconfig_local_path | expanduser }}
  delegate_to: localhost
  become: false
  register: kubeconfig_server_line
  changed_when: false
  failed_when: >
    '127.0.0.1' in kubeconfig_server_line.stdout or
    'localhost' in kubeconfig_server_line.stdout

- name: Remind where the kubeconfig was written
  ansible.builtin.debug:
    msg: >-
      Kubeconfig written to {{ kubeconfig_local_path }} (kubectl's default
      location), so no KUBECONFIG export needed. Note: this OVERWRITES that
      file — if you use kubectl with other clusters, merge contexts instead
      of using this default path.
  delegate_to: localhost
  become: false